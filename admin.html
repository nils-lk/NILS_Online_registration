<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <title>NILS Admin Dashboard - Edit & Manage</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        h2 {
            color: #003366;
            text-align: center;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 10px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn {
            flex: 2;
            background: #28a745;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            background: #6c757d;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        table {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #eee;
            text-align: left;
            font-size: 13px;
        }

        th {
            background: #003366;
            color: white;
        }

        .action-btns {
            display: flex;
            gap: 5px;
        }

        .btn-edit {
            background: #ffc107;
            color: black;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-del {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        #loading {
            font-weight: bold;
            color: #003366;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="admin-box">
        <h2 id="formTitle">Add New Programme</h2>
        <form id="adminForm">
            <input type="hidden" id="rowId">

            <label>Course Name</label><input type="text" id="name" required>

            <label>Category</label>
            <select id="category">
                <option>One Day Programs</option>
                <option>Two Day Programs</option>
                <option>Three Day Programs</option>
                <option>Five Day Programs</option>
                <option>Diploma</option>
                <option>Workshops</option>
                <option>Certificate Courses</option>
            </select>

            <label>Description</label><textarea id="description" rows="3"></textarea>

            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>Date</label><input type="text" id="date"></div>
                <div style="flex:1;"><label>Time</label><input type="text" id="time"></div>
            </div>

            <label>Location</label><input type="text" id="location" value="NILS Auditorium">
            <label>Price (LKR)</label><input type="number" id="price" required>

            <label>Installments Available?</label>
            <select id="installments">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Apply Link</label><input type="url" id="apply_link">
            <label>Image URL (Google Drive Link)</label><input type="url" id="image_url">

            <div class="btn-container">
                <button type="submit" id="saveBtn" class="save-btn">Save Programme</button>
                <button type="button" id="cancelBtn" class="cancel-btn" onclick="resetForm()">Cancel Edit</button>
            </div>
        </form>
    </div>

    <div id="loading">දත්ත ලබාගනිමින් පවතී...</div>

    <table>
        <thead>
            <tr>
                <th>Category</th>
                <th>Name</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxlMiseZ5YjuzOFeNWSaJ5mqQ-EC5tWGIsFbRMGpTCBeGhiqZLLBJRI-Ch2ib6NjFEA/exec";

        // 1. දත්ත ඇතුළත් කිරීම හෝ වෙනස් කිරීම (Add or Update)
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rowId = document.getElementById('rowId').value;
            const btn = document.getElementById('saveBtn');

            btn.disabled = true;
            btn.innerText = rowId ? "Updating..." : "Saving...";

            const payload = {
                action: rowId ? "update" : "add",
                rowId: parseInt(rowId),
                category: document.getElementById('category').value,
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                location: document.getElementById('location').value,
                price: document.getElementById('price').value,
                installments: document.getElementById('installments').value,
                apply_link: document.getElementById('apply_link').value,
                image_url: document.getElementById('image_url').value
            };

            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            alert(rowId ? "සාර්ථකව වෙනස් කළා!" : "සාර්ථකව ඇතුළත් කළා!");
            resetForm();
            loadAdminTable();
        });

        // 2. දැනට ඇති දත්ත ලැයිස්තුව පෙන්වීම
        async function loadAdminTable() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const tableBody = document.getElementById('tableBody');

                document.getElementById('loading').style.display = 'none';

                tableBody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.Category}</td>
                    <td><b>${item.Name}</b></td>
                    <td>${Number(item.Price).toLocaleString()}</td>
                    <td class="action-btns">
                        <button class="btn-edit" onclick='fillForm(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Edit</button>
                        <button class="btn-del" onclick="deleteItem(${item.rowId})">Delete</button>
                    </td>
                </tr>
            `).join('');
            } catch (err) {
                document.getElementById('loading').innerText = "දත්ත ලබාගැනීමට නොහැකි විය.";
            }
        }

        // 3. Edit බටන් එක එබූ විට Form එක පිරවීම
        function fillForm(item) {
            document.getElementById('rowId').value = item.rowId;
            document.getElementById('name').value = item.Name;
            document.getElementById('category').value = item.Category;
            document.getElementById('description').value = item.Description || "";
            document.getElementById('date').value = item.Date || "";
            document.getElementById('time').value = item.Time || "";
            document.getElementById('location').value = item.Location || "";
            document.getElementById('price').value = item.Price;
            document.getElementById('installments').value = item.Installments || "Yes";
            document.getElementById('apply_link').value = item.Apply_Link || "";
            document.getElementById('image_url').value = item.Image_URL || "";

            document.getElementById('formTitle').innerText = "Edit Programme";
            document.getElementById('saveBtn').innerText = "Update Changes";
            document.getElementById('saveBtn').style.background = "#ffc107";
            document.getElementById('saveBtn').style.color = "black";
            document.getElementById('cancelBtn').style.display = "block";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 4. Form එක මුල් තත්වයට පත් කිරීම
        function resetForm() {
            document.getElementById('adminForm').reset();
            document.getElementById('rowId').value = "";
            document.getElementById('formTitle').innerText = "Add New Programme";
            document.getElementById('saveBtn').innerText = "Save Programme";
            document.getElementById('saveBtn').style.background = "#28a745";
            document.getElementById('saveBtn').style.color = "white";
            document.getElementById('cancelBtn').style.display = "none";
        }

        // 5. දත්ත පේළියක් මැකීම
        async function deleteItem(id) {
            if (confirm("මෙම පාඨමාලාව ස්ථිරවම මකා දැමීමට අවශ්‍යද?")) {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "delete", rowId: id })
                });
                alert("සාර්ථකව මකා දැමුවා!");
                loadAdminTable();
            }
        }

        loadAdminTable();
    </script>
</body>

</html>
