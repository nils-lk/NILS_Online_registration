<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NILS Online Registration Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --nils-blue: #003366;
            --nils-gold: #ffcc00;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #0f172a;
            --text-sub: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .top-bar {
            background: #ffffff;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header {
            background: linear-gradient(-45deg, #003366, #00509d, #001a33, #003366);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 4rem 1rem 5rem;
            text-align: center;
            border-bottom: 6px solid var(--nils-gold);
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            max-width: 1300px;
            margin: auto;
            padding: 0 20px 60px;
            position: relative;
            z-index: 20;
        }

        .controls-section {
            max-width: 900px;
            margin: -40px auto 50px;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .category-nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .cat-pill {
            padding: 10px 22px;
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-pill.active {
            background: var(--nils-blue);
            color: white;
            border-color: var(--nils-blue);
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            transition: 0.4s;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .card-img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            position: relative;
            background: #eee;
            cursor: zoom-in;
        }

        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 51, 102, 0.85);
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            z-index: 5;
        }

        .badge-tag {
            top: 45px;
            background: #ea580c;
        }

        /* දෙවැනි badge එක සඳහා */

        .card-body {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .price-tag {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ea580c;
            margin-top: 15px;
        }

        /* Image Modal */
        .img-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        footer {
            background: var(--nils-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
            border-top: 5px solid var(--nils-gold);
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <div id="google_translate_element"></div>
    </div>

    <header>
        <h1>NILS Online Registration</h1>
        <p>National Institute of Labour Studies - Sri Lanka</p>
    </header>

    <div class="img-modal-overlay" id="imgModal" onclick="this.style.display='none'"><span
            class="close-btn">&times;</span><img id="fullImg"
            style="max-width:90%; max-height:85vh; border-radius:10px;"></div>

    <div class="container">
        <div class="controls-section">
            <input type="text" id="searchInput" class="search-box" placeholder="Search for a course..."
                onkeyup="applyFilters()"
                style="width:100%; padding:15px; border-radius:14px; border:1px solid #e2e8f0; outline:none;">
            <div class="category-nav" id="categoryNav">
                <div class="cat-pill active" onclick="setCat('All')">All Programs</div>
            </div>
        </div>
        <div id="loader" style="text-align:center;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>
        <div class="course-grid" id="courseGrid"></div>
    </div>

    <footer>
        <p>© <span id="year"></span> National Institute of Labour Studies</p>
        <p>Developed by - V.P.R.L. Vidanapathirana</p>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() { new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'si,ta,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element'); }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxlMiseZ5YjuzOFeNWSaJ5mqQ-EC5tWGIsFbRMGpTCBeGhiqZLLBJRI-Ch2ib6NjFEA/exec";
        let allData = [];
        let currentCat = 'All';

        document.getElementById('year').textContent = new Date().getFullYear();

        function fixImg(url) {
            if (!url) return 'https://via.placeholder.com/600x600?text=No+Image';
            if (url.includes('drive.google.com')) {
                const id = url.split('id=')[1] || url.split('/d/')[1].split('/')[0];
                return `https://lh3.googleusercontent.com/d/${id}=w1000`;
            }
            return url;
        }

        async function load() {
            try {
                const r = await fetch(API_URL);
                allData = await r.json();
                updateNav();
                applyFilters();
            } catch (e) { document.getElementById('loader').innerText = "Failed to load."; }
        }

        function updateNav() {
            const nav = document.getElementById('categoryNav');
            let cats = [];
            allData.forEach(i => {
                if (i.Category) {
                    // කමාවෙන් වෙන් කරලා වෙන වෙනම කැටගරි ටික ගන්නවා
                    const parts = i.Category.split(',').map(s => s.trim());
                    cats.push(...parts);
                }
            });
            const uniqueCats = [...new Set(cats)].filter(Boolean);
            uniqueCats.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cat-pill';
                div.innerText = c;
                div.onclick = () => setCat(c);
                nav.appendChild(div);
            });
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(i => {
                const nameMatch = i.Name.toLowerCase().includes(q);
                // කැටගරි එක ඇතුළේ "All" නෙමෙයි නම්, තෝරපු වචනය තියෙනවද බලනවා
                const catMatch = currentCat === 'All' || (i.Category && i.Category.includes(currentCat));
                return nameMatch && catMatch;
            });
            render(filtered);
        }

        function render(data) {
            document.getElementById('loader').style.display = 'none';
            const grid = document.getElementById('courseGrid');
            grid.innerHTML = data.map(item => {
                // කැටගරි බජ් දෙකක් හදන විදිහ
                const catParts = item.Category ? item.Category.split(',').map(s => s.trim()) : [];
                let badgeHTML = `<span class="badge">${catParts[0] || ''}</span>`;
                if (catParts[1]) badgeHTML += `<span class="badge badge-tag">${catParts[1]}</span>`;

                const priceDisp = String(item.Price).toLowerCase() === 'free' ? 'FREE' : 'LKR ' + Number(item.Price).toLocaleString();
                const imgSrc = fixImg(item.Image_URL);

                return `
                <div class="card">
                    <div class="card-img-container" onclick="openImg('${imgSrc}')">
                        ${badgeHTML}
                        <img src="${imgSrc}" class="card-img" loading="lazy">
                    </div>
                    <div class="card-body">
                        <h3>${item.Name}</h3>
                        <p style="font-size:0.85rem; color:#64748b;">${item.Description ? item.Description.substring(0, 80) + '...' : ''}</p>
                        <div class="info-group" style="margin-top:10px; font-size:0.8rem;">
                            <div><i class="fa-regular fa-calendar"></i> ${item.Date || 'TBA'}</div>
                            <div><i class="fa-solid fa-location-dot"></i> ${item.Location || 'NILS'}</div>
                        </div>
                        <div class="price-tag">${priceDisp}</div>
                        <a href="${item.Apply_Link || '#'}" target="_blank" class="apply-btn" style="background:var(--nils-blue); color:white; text-align:center; padding:12px; border-radius:12px; text-decoration:none; margin-top:15px; font-weight:600;">Register Now</a>
                    </div>
                </div>`;
            }).join('');
        }

        function setCat(c) {
            currentCat = c;
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('active', p.innerText === c));
            applyFilters();
        }

        function openImg(src) { document.getElementById('fullImg').src = src; document.getElementById('imgModal').style.display = 'flex'; }
        load();
    </script>
</body>

</html>
